# ============================================================
# DUBBING PROJECT — GLOBAL CONFIGURATION
# ============================================================

project:
  name: "dubbing_v2"
  version: "1.0.0"

# ============================================================
# PATHS
# ============================================================
paths:
  data_input:  "data/input"
  data_audio:  "data/audio"
  data_output: "data/outputs"
  jobs:        "jobs"
  models_cache: "models/cache"
  logs:        "logs"
  stages:      "stages"

# ============================================================
# LANGUAGE SETTINGS
# ============================================================
language:
  source:           "auto"
  bridge:           "en"
  target:           "en"
  target_name:      "English"
  code_mixing:      false
  code_mixing_style: "tenglish"

# ============================================================
# HARDWARE
# ============================================================
hardware:
  gpu_available: true
  vram_gb:       4
  ram_gb:        16
  device:        "cuda"
  cpu_fallback:  true

# ============================================================
# STAGE SETTINGS
# ============================================================
stages:

  vocals:
    env_name:      "dub_vocals"
    demucs_model:  "mdx_extra_q"
    sample_rate:   16000

  asr:
    env_name:       "dub_asr"
    model:          "medium"
    device:         "cuda"
    compute_type:   "int8_float16"
    language:       "en"
    word_timestamps: true
    chunk_size:     10
    min_silence_ms: 400
    min_segment_duration_s: 1.0
    min_segment_words: 3

  diarization:
    env_name:               "dub_diar"
    device:                 "cuda"
    max_num_speakers:       50
    distance_threshold:     0.75
    speaker_profile_min_s:  3.0
    speaker_profile_max_s:  10000.0

  emotion:
    env_name:     "dub_emotion"
    acoustic_model: "audeering/wav2vec2-large-robust-12-ft-emotion-msp-dim"
    audio_model:  "audeering/wav2vec2-large-robust-12-ft-emotion-msp-dim"
    text_model:   "j-hartmann/emotion-english-distilroberta-base"
    audio_weight: 0.65
    text_weight:  0.35
    device:       "cuda"
    labels:
      - "neutral"
      - "calm"
      - "happy"
      - "sad"
      - "angry"
      - "fearful"
      - "surprised"
      - "disgusted"

  translation:
    env_name:    "dub_translate"
    model:       "ai4bharat/indictrans2-en-indic-dist-200M"
    device:      "cuda"
    code_mixing: true
    keep_english:
      - named_entities
      - technical_terms
      - loanwords
      - short_neutral_words

  tts:
    env_name:   "dub_tts"
    model:      "tts_models/multilingual/multi-dataset/xtts_v2"
    device:     "cuda"
    sample_rate: 22050

    # Reference audio settings
    # Dialogue clip from vocals WAV is used first (captures emotion naturally)
    # Falls back to speaker profile if clip is shorter than min_ref_duration_s
    min_ref_duration_s: 3.0     # Minimum clip length for reliable voice cloning

    # Time stretch limits
    # ratio = target_duration / synthesized_duration
    # > 1.0 = slow down (synthesized shorter than slot)
    # < 1.0 = speed up  (synthesized longer than slot)
    min_stretch_ratio: 0.7
    max_stretch_ratio: 1.5

    # Chatterbox Turbo specific parameters
    # exaggeration: mapped automatically from emotion intensity (0.3 → 0.9)
    # 0.3 = flat/calm delivery   (low intensity dialogues)
    # 0.9 = very expressive      (high intensity dialogues)
    exaggeration_min: 0.3
    exaggeration_max: 0.9

    # cfg_weight: controls how faithful the model stays to the reference voice
    # Higher = more faithful clone. 3.0 is a good balance for dubbing.
    cfg_weight: 3.0

  assembly:
    env_name:    "dub_assembly"
    sample_rate: 22050           # Updated to match Chatterbox Turbo output
    timestamp_tolerance_ms: 80
    fade_ms:     10
    nonlexical_sounds:
      - "hmm"
      - "uh"
      - "ah"
      - "ha"
      - "hey"
      - "ok"
      - "okay"
      - "no"
      - "yeah"
      - "hm"
      - "um"

# ============================================================
# PIPELINE CONTROL
# ============================================================
pipeline:
  run_stages:
    - "00_vocals"
    - "01_asr"
    - "01b_diarization"
    - "02_emotion"
    - "03_translation"
    - "04_tts"
    - "05_assembly"
  stop_on_error: true
  restart_safe:  true